name: Lake Formation Cloud Tests

# These tests exercise the real AWS Glue + Lake Formation APIs against the duckdblabs Iceberg test
# account. They require AWS credentials and are only meaningful with repository secrets configured,
# so they run on a schedule and on manual dispatch rather than on every push.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  lake-formation-cloud:
    name: Lake Formation cloud tests
    runs-on: ubuntu-latest
    env:
      VCPKG_TARGET_TRIPLET: x64-linux
      GEN: ninja
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Install Ninja
        run: sudo apt-get update -y -qq && sudo apt-get install -y -qq ninja-build

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgGitCommitId: ce613c41372b23b1f51333815feb3edd87ef8a8b

      - name: Build extension
        env:
          VCPKG_TOOLCHAIN_PATH: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
        run: make release

      - name: Set up Lake Formation data filters
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ICEBERG_TEST_USER_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ICEBERG_TEST_USER_SECRET }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_ICEBERG_TEST_USER_REGION }}
          AWS_REGION: ${{ secrets.S3_ICEBERG_TEST_USER_REGION }}
          ICEBERG_LF_REGION: ${{ secrets.S3_ICEBERG_TEST_USER_REGION }}
        run: |
          python3 -m pip install boto3
          python3 scripts/setup_lf_data_filters.py --action=create

      - name: Run Lake Formation cloud tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ICEBERG_TEST_USER_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_ICEBERG_TEST_USER_SECRET }}
          AWS_DEFAULT_REGION: ${{ secrets.S3_ICEBERG_TEST_USER_REGION }}
          ICEBERG_LF_REMOTE_AVAILABLE: 1
          LAKEFORMATION_TEST_CONFIG_SETUP: 1
          ICEBERG_LF_REGION: ${{ secrets.S3_ICEBERG_TEST_USER_REGION }}
          ICEBERG_LF_CATALOG_ID: 840140254803:s3tablescatalog/duckdblabs-iceberg-testing
          ICEBERG_LF_TEST_ROLE_ARN: arn:aws:iam::840140254803:role/pyiceberg-etl-role
          ICEBERG_LF_SESSION_TAG: duckdb
        run: |
          ./build/release/test/unittest --order lex "$PWD/test/sql/lakeformation/*" --test-config test/configs/lakeformation.json
